<!DOCTYPE html>
<html lang="zh-CN" data-theme="blueprint">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #00d9ff;
      --accent-secondary: #00ff88;
      --accent-gradient: linear-gradient(135deg, #00d9ff, #00ff88);
      --border-color: rgba(0, 217, 255, 0.3);
      --shadow: 0 4px 20px rgba(0, 217, 255, 0.15);
      --shadow-hover: 0 8px 40px rgba(0, 217, 255, 0.3);
      --radius: 12px;
      --nav-bg: rgba(15, 52, 96, 0.8);
      --progress-bg: rgba(0, 217, 255, 0.2);
    }

    [data-theme="dark"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-card: #252525;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --accent: #ff6b6b;
      --accent-secondary: #feca57;
      --accent-gradient: linear-gradient(135deg, #ff6b6b, #feca57);
      --border-color: rgba(255, 107, 107, 0.3);
      --shadow: 0 4px 20px rgba(255, 107, 107, 0.15);
      --shadow-hover: 0 8px 40px rgba(255, 107, 107, 0.3);
      --radius: 12px;
      --nav-bg: rgba(37, 37, 37, 0.8);
      --progress-bg: rgba(255, 107, 107, 0.2);
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent: #0066cc;
      --accent-secondary: #00cc66;
      --accent-gradient: linear-gradient(135deg, #0066cc, #00cc66);
      --border-color: rgba(0, 102, 204, 0.2);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      --shadow-hover: 0 8px 40px rgba(0, 102, 204, 0.2);
      --radius: 12px;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --progress-bg: rgba(0, 102, 204, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* 网格背景 */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(var(--border-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    /* 进度条 */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--accent-gradient);
      transition: width 0.3s ease;
      z-index: 200;
    }

    .deck {
      height: 100vh;
      width: 100vw;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 80px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      background: var(--bg-primary);
      transform: translateY(0);
    }

    .slide::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 80%, var(--accent) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, var(--accent-secondary) 0%, transparent 50%);
      opacity: 0.05;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    .slide.active .card,
    .slide.active .list li,
    .slide.active p,
    .slide.active h2,
    .slide.active pre,
    .slide.active ul,
    .slide.active .content > *:not(h1) {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .slide.active .card.show,
    .slide.active .list li.show,
    .slide.active p.show,
    .slide.active h2.show,
    .slide.active pre.show,
    .slide.active ul.show,
    .slide.active .content > *:not(h1).show {
      opacity: 1;
      transform: translateY(0);
    }

    .slide.active h1 {
      animation: fadeSlideIn 0.5s ease forwards;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide.cover {
      text-align: center;
    }

    .slide.cover h1 {
      font-size: 4.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide.cover .subtitle {
      font-size: 1.8rem;
      color: var(--text-secondary);
    }

    .slide:not(.cover) h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 40px;
      color: var(--text-primary);
    }

    .slide:not(.cover) h2 {
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 30px;
      color: var(--accent);
    }

    .slide .content {
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    .slide p {
      font-size: 1.5rem;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .slide ul, .slide ol {
      list-style: none;
      padding: 0;
    }

    .slide li {
      font-size: 1.4rem;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* 卡片布局 */
    .slide.cards {
      overflow-y: auto;
      padding-bottom: 80px;
    }

    .slide.cards .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 1200px;
      padding: 10px;
    }

    .slide.cards .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px;
      text-align: left;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .slide.cards .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .slide.cards .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .slide.cards .card-content {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    /* 列表布局 */
    .slide.list ul {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 40px;
      width: 100%;
      max-width: 900px;
      text-align: left;
    }

    .slide.list li {
      padding: 12px 16px;
      padding-left: 28px;
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1.1rem;
    }

    .slide.list li::before {
      content: '›';
      position: absolute;
      left: 10px;
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: bold;
      line-height: 1.2;
    }

    /* 步骤布局 */
    .slide.steps ol {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .slide.steps li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      min-width: 200px;
    }

    .slide.steps .step-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--accent-gradient);
      border-radius: 50%;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--bg-primary);
      flex-shrink: 0;
    }

    /* 水印 */
    .watermark {
      position: fixed;
      bottom: 20px;
      right: 30px;
      font-size: 14px;
      color: var(--text-secondary);
      opacity: 0.5;
      z-index: 50;
      pointer-events: none;
    }

    /* 导航 */
    .nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .nav button {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .nav button:hover {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .nav button:active {
      transform: scale(0.95);
    }

    .nav .page-info {
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* 主题切换 */
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      margin-left: 8px;
    }

    .theme-toggle:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .fullscreen .nav {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .fullscreen:hover .nav {
      opacity: 1;
    }

    /* 响应式 */
    @media (max-width: 1200px) {
      .slide.cards .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 900px) {
      .slide.cards .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .slide {
        padding: 40px 24px;
      }

      .slide.cover h1 {
        font-size: 2.5rem;
      }

      .slide.cover .subtitle {
        font-size: 1.2rem;
      }

      .slide:not(.cover) h1 {
        font-size: 2rem;
      }

      .slide:not(.cover) h2 {
        font-size: 1.6rem;
      }

      .slide p, .slide li {
        font-size: 1.1rem;
      }

      .slide.cards .cards-grid {
        grid-template-columns: 1fr;
        overflow-y: visible;
      }

      .slide.cards {
        overflow-y: visible;
      }

      .slide.list ul {
        grid-template-columns: 1fr;
      }

      .slide.steps ol {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="progress-bar" id="progressBar"></div>

  <div class="deck" id="deck">
    {{slides}}
  </div>

  <div class="watermark">Cloud927</div>

  <div class="nav">
    <button id="prevBtn">←</button>
    <span class="page-info"><span id="currentPage">1</span> / <span id="totalPages">1</span></span>
    <button id="nextBtn">→</button>
    <button id="fullscreenBtn">⛶</button>
    <button class="theme-toggle" id="themeBtn" title="切换主题">◑</button>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    let currentIndex = 0;
    let contentShown = false;
    let touchStartX = 0;
    let touchEndX = 0;

    const themes = ['blueprint', 'dark', 'light'];
    let currentThemeIndex = 0;

    // 初始化主题
    function initTheme() {
      const savedTheme = localStorage.getItem('deck-theme') || 'blueprint';
      const themeIndex = themes.indexOf(savedTheme);
      if (themeIndex >= 0) {
        currentThemeIndex = themeIndex;
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    }

    // 切换主题
    function toggleTheme() {
      currentThemeIndex = (currentThemeIndex + 1) % themes.length;
      const theme = themes[currentThemeIndex];
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('deck-theme', theme);
    }

    // 更新进度条
    function updateProgress() {
      const progress = ((currentIndex + 1) / totalSlides) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    document.getElementById('totalPages').textContent = totalSlides;
    initTheme();
    updateProgress();

    // 显示内容函数
    function showContent() {
      const currentSlide = slides[currentIndex];
      if (contentShown) return;

      const contentElements = currentSlide.querySelectorAll('.card, .list li, p, h2, pre, ul, .content > *:not(h1)');
      contentElements.forEach((el, i) => {
        setTimeout(() => {
          el.classList.add('show');
        }, i * 80);
      });

      contentShown = true;
    }

    function showSlide(index, direction = 'next') {
      const currentSlide = slides[currentIndex];
      const nextSlideEl = slides[index];

      // 重置内容显示状态
      contentShown = false;

      // 清除之前的内容show类（立即隐藏，不带过渡动画）
      currentSlide.querySelectorAll('.show').forEach(el => {
        el.style.transition = 'none';
        el.classList.remove('show');
      });

      // 确保新页面的内容也立即隐藏
      nextSlideEl.querySelectorAll('.card, .list li, p, h2, pre, ul, .content > *:not(h1)').forEach(el => {
        el.style.transition = 'none';
        el.classList.remove('show');
      });

      // 设置动画方向
      if (direction === 'next') {
        currentSlide.style.transform = 'translateY(-100%)';
        currentSlide.style.transition = 'transform 0.4s ease';
        nextSlideEl.style.transform = 'translateY(100%)';
        nextSlideEl.style.transition = 'transform 0.4s ease';
      } else {
        currentSlide.style.transform = 'translateY(100%)';
        currentSlide.style.transition = 'transform 0.4s ease';
        nextSlideEl.style.transform = 'translateY(-100%)';
        nextSlideEl.style.transition = 'transform 0.4s ease';
      }

      // 先隐藏所有幻灯片
      slides.forEach((slide, i) => {
        slide.classList.remove('active');
      });

      // 立即显示新幻灯片并触发动画
      requestAnimationFrame(() => {
        nextSlideEl.classList.add('active');
        // 恢复新页面内容的过渡动画
        requestAnimationFrame(() => {
          nextSlideEl.querySelectorAll('.card, .list li, p, h2, pre, ul, .content > *:not(h1)').forEach(el => {
            el.style.transition = '';
          });
          nextSlideEl.style.transform = 'translateY(0)';
          currentSlide.style.transform = 'translateY(0)';
        });
      });

      // 动画完成后清理
      setTimeout(() => {
        currentSlide.style.transition = '';
        nextSlideEl.style.transition = '';
        currentSlide.style.transform = '';
      }, 400);

      document.getElementById('currentPage').textContent = index + 1;
      currentIndex = index;
      updateProgress();

      // URL 哈希更新
      history.replaceState(null, null, '#' + (index + 1));
    }

    function nextSlide() {
      if (currentIndex < totalSlides - 1) {
        showSlide(currentIndex + 1, 'next');
      }
    }

    function prevSlide() {
      if (currentIndex > 0) {
        showSlide(currentIndex - 1, 'prev');
      }
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (!contentShown) {
        showContent();
      } else {
        nextSlide();
      }
    });
    document.getElementById('prevBtn').addEventListener('click', prevSlide);

    // 主题切换
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);

    // 键盘导航
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        if (!contentShown) {
          showContent();
        } else {
          nextSlide();
        }
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (!contentShown) {
          showContent();
        }
      } else if (e.key === 'Escape') {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        }
      } else if (e.key === 't' || e.key === 'T') {
        toggleTheme();
      }
    });

    // 触摸支持
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      const swipeThreshold = 50;
      const diff = touchStartX - touchEndX;

      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
          // 左滑 - 下一页
          if (!contentShown) {
            showContent();
          } else {
            nextSlide();
          }
        } else {
          // 右滑 - 上一页
          prevSlide();
        }
      }
    }

    // 全屏
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      const deck = document.getElementById('deck');
      if (!document.fullscreenElement) {
        deck.requestFullscreen().then(() => {
          deck.classList.add('fullscreen');
        });
      } else {
        document.exitFullscreen().then(() => {
          deck.classList.remove('fullscreen');
        });
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const deck = document.getElementById('deck');
      if (!document.fullscreenElement) {
        deck.classList.remove('fullscreen');
      }
    });

    // URL 哈希导航
    function handleHashChange() {
      const hash = window.location.hash.slice(1);
      if (hash) {
        const page = parseInt(hash) - 1;
        if (page >= 0 && page < totalSlides && page !== currentIndex) {
          const direction = page > currentIndex ? 'next' : 'prev';
          showSlide(page, direction);
        }
      }
    }

    window.addEventListener('hashchange', handleHashChange);

    // 初始化 - 修复首屏闪烁
    function init() {
      slides.forEach((slide, i) => {
        slide.classList.remove('active');
        slide.querySelectorAll('.card, .list li, p, h2, pre, ul, .content > *:not(h1)').forEach(el => {
          el.classList.remove('show');
        });
      });
      slides[0].classList.add('active');
      currentIndex = 0;
      updateProgress();
    }

    init();
  </script>
</body>
</html>
